services:
  smart-box:
    container_name: smart-box
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-5000}:${FLASK_PORT:-5000}"
    privileged: ${DOCKER_PRIVILEGED:-false}
    devices:
      - "${SERIAL_DEVICE_MAPPING:-/dev/null:/dev/null}"
    environment:
      DATA_DIR: ${DATA_DIR:-/app/data}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/smart-box.db}
      SEED_PATH: ${SEED_PATH:-/app/seed_data.json}
      FRONTEND_DIST_DIR: ${FRONTEND_DIST_DIR:-/app/frontend/dist}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_FILE: ${LOG_FILE:-smart-box.log}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_BACKUP_DAYS: ${LOG_BACKUP_DAYS:-14}
      RFID_DEBOUNCE_SECONDS: ${RFID_DEBOUNCE_SECONDS:-1.5}
      STATION_SIGNAL_MODE: ${STATION_SIGNAL_MODE:-gpio}
      ENABLE_STATION_SIGNAL: ${ENABLE_STATION_SIGNAL:-true}
      STATION_SIGNAL_GPIO: ${STATION_SIGNAL_GPIO:-24}
      STATION_SIGNAL_ACTIVE_LEVEL: ${STATION_SIGNAL_ACTIVE_LEVEL:-low}
      ENABLE_SERIAL_CONTROLLER: ${ENABLE_SERIAL_CONTROLLER:-false}
      SERIAL_PORT: ${SERIAL_PORT:-/dev/ttyACM0}
      SERIAL_BAUDRATE: ${SERIAL_BAUDRATE:-9600}
      SERIAL_TIMEOUT: ${SERIAL_TIMEOUT:-0.5}
      RC522_GPIO_MODE: ${RC522_GPIO_MODE:-BCM}
      FLASK_HOST: ${FLASK_HOST:-0.0.0.0}
      FLASK_PORT: ${FLASK_PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me}
      ADMIN_SESSION_TIMEOUT_SECONDS: ${ADMIN_SESSION_TIMEOUT_SECONDS:-1800}
      ENABLE_LOCAL_DEBUG_SDK: ${ENABLE_LOCAL_DEBUG_SDK:-true}
      ENABLE_WEBVIEW: ${ENABLE_WEBVIEW:-false}
    group_add:
      - "${GPIO_GROUP_ID:-997}"
    volumes:
      - smart-box-data:/app/data
      - smart-box-logs:/app/logs
      - ./.env.ad:/app/.env.ad:ro
    restart: unless-stopped

volumes:
  smart-box-data:
  smart-box-logs:
